# Starship Shell Prompt Config
# Loaded via shell/modules/prompt.sh when JNSHELL_PROMPT=starship.

add_newline = true
format = """
[в•ӯв”Җ](242)\
[оӮ¶](color_orange)\
$username$hostname$sudo\
[оӮ°](bg:color_yellow fg:color_orange)\
$directory\
[оӮ°](fg:color_yellow bg:color_aqua)\
$env_var\
[оӮ°](fg:color_aqua)\
$fill\
[оӮІ](fg:color_python_blue)\
$python$netns\
[оӮІ](fg:color_green bg:color_python_blue)\
$cmd_duration\
[оӮІ](fg:color_aqua bg:color_green)\
$jobs\
[оӮІ](fg:color_bg bg:color_aqua)\
$time\
[оӮҙ](fg:color_bg)\
$line_break\
[в•°в”Җ](242)$character"""
right_format = "$status"
command_timeout = 1000
continuation_prompt = " в–¶в–¶ "
palette = 'gruvbox_dark'
[palettes.gruvbox_dark]
color_text = '#fbf1c7'
color_text_dark = '#a0a9cb'
color_bg = '#3c3836'
color_python_blue = '#4b8bbe'
color_python_yellow = '#ffd43b'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d1951f'

[character]
success_symbol        = "[вқҜ](39 bold)"
error_symbol          = "[вқҜ](red bold)"
vimcmd_symbol         = "[вқ®](39 bold)"
# It appears that Zsh visual sub-modes are not yet working
# https://github.com/starship/starship/issues/625#issuecomment-732454148
vimcmd_visual_symbol  = "[V](39 bold)"
vimcmd_replace_symbol = "[в–¶](39 bold)"

[sudo]
style  = "fg:color_text bold bg:color_orange"
symbol = "о·… "
format = "[$symbol]($style)"
disabled = false

[username]
disabled = true

[hostname]
ssh_only = true
ssh_symbol = "п’ү "
style = "fg:color_text bold bg:color_orange"
format = "[$ssh_symbol]($style)"

[directory]
truncation_length = 4
truncate_to_repo  = true
style             = "fg:color_text bold bg:color_yellow"
format            = "[$path]($style)[$read_only]($read_only_style)"
read_only         = "пҖЈ"
read_only_style   = "red"

################################################################################
# Git related settings - BEGIN
################################################################################

# Built-in git status sections
# Prompt setting: $git_branch$git_commit$git_state$git_status
# -----------------------------------------------------------

[git_commit]
disabled = true
style         = "fg:color_text bold bg:color_aqua"
format        = '[$hash$tag ]($style)'
only_detached = true
tag_disabled  = true

[git_status]
disabled = true
style       = "fg:color_text bold bg:color_aqua"
format      = "([$all_status$ahead_behind]($style))"
ahead       = " пӮӘ ${count}"
behind      = " пӮ« {count}"
diverged    = " пӮ« {behind_count} пӮӘ ${ahead_count}"
up_to_date  = ""
conflicted  = " уұЎқ ${count}"
untracked   = " пҒҷ ${count}"
modified    = " пҒӘ ${count}"
staged      = " пҒ• ${count}"
renamed     = " пӮ© ${count}"
deleted     = " п”° ${count}"
stashed     = " пҖң ${count}"
typechanged = ""

[git_state]
disabled = true
style        = "fg:red bold bg:color_aqua"
format       = "([$state( $progress_current/$progress_total)]($style))"
rebase       = "REBASING"
merge        = "MERGING"
revert       = "REVERTING"
cherry_pick  = "CHERRY-PICKING"
bisect       = "BISECTING"
am           = "AM"
am_or_rebase = "AM/REBASE"

[git_branch]
disabled = true
symbol            = " п„Ұ"
style             = "fg:color_text bold bg:color_aqua"
format            = "[$symbol $branch]($style)"
truncation_length = 24
truncation_symbol = "вҖҰ"
ignore_branches   = []


# Gitstatusd-backed "manual" prompt sections
# Prompt setting: $env (this renders all env_var's in declaration order)
# ----------------------------------------------------------------------

[env_var.gsd_on]
variable = "GSD_ON"
style    = "fg:color_text bold bg:color_aqua"
format   = "[ п„Ұ $env_value]($style)"

[env_var.gsd_action]
variable = "GSD_ACTION"
style    = "fg:red bold bg:color_aqua"
format   = "[ $env_value]($style)"

[env_var.gsd_ahead]
variable = "GSD_AHEAD"
style    = "fg:color_text bold bg:color_aqua"
format   = "[ пӮӘ $env_value]($style)"

[env_var.gsd_behind]
variable = "GSD_BEHIND"
style    = "fg:color_text bold bg:color_aqua"
format   = "[ пӮ« $env_value]($style)"

[env_var.gsd_staged]
variable = "GSD_STAGED"
style    = "fg:color_text bold bg:color_aqua"
format   = "[ пҒ• $env_value]($style)"

[env_var.gsd_unstaged]
variable = "GSD_UNSTAGED"
style    = "fg:color_text bold bg:color_aqua"
format   = "[ пҒӘ $env_value]($style)"

[env_var.gsd_untracked]
variable = "GSD_UNTRACKED"
style    = "fg:color_text bold bg:color_aqua"
format   = "[ пҒҷ $env_value]($style)"

[env_var.gsd_conflicted]
variable = "GSD_CONFLICTED"
style    = "fg:red bold bg:color_aqua"
format   = "[ уұЎқ $env_value]($style)"

[env_var.gsd_deleted]
variable = "GSD_DELETED"
style    = "fg:red bold bg:color_aqua"
format   = "[ п”° $env_value]($style)"

[env_var.gsd_stashes]
variable = "GSD_STASHES"
style    = "fg:color_text bold bg:color_aqua"
format   = "[ пҖң $env_value]($style)"

################################################################################
# Git related settings - END
################################################################################

[status]
symbol                = "вңҳ"
not_executable_symbol = "п“ҙ "
not_found_symbol      = "пҖӮ "
sigint_symbol         = "оҖү"
signal_symbol         = "оҖҠ"
style                 = "red bold"
format                = " [$symbol $common_meaning$signal_name$maybe_int]($style)"
disabled = false

[python]
symbol             = "оңј "
style              = "fg:color_python_yellow bold bg:color_python_blue"
format             = "[$symbol$virtualenv ${version}]($style)"
pyenv_version_name = false
detect_files       = []
detect_extensions  = []
generic_venv_names = ['venv', '.venv']
version_format     = "v${major}.${minor}"

[netns]
symbol             = "ојү "
style              = "fg:color_text bold bg:color_python_blue"
format             = "[ $symbol$name]($style)"

[cmd_duration]
min_time = 2000
style    = "fg:color_text bg:color_green"
format   = "[$duration]($style)"

[jobs]
threshold = 1
symbol    = "пҖ“"
style     = "fg:color_text bold bg:color_aqua"
format    = "[$symbol $number]($style)"

[time]
style       = "fg:color_text_dark bg:color_bg"
format      = "[пҗә $time]($style)"
time_format = "%H:%M:%S"
disabled = false

[fill]
symbol = "В·"
style  = "237"
