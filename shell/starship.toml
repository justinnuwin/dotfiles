# Starship Shell Prompt Config
# Loaded via shell/modules/prompt.sh when JNSHELL_PROMPT=starship.

add_newline = true
format = """
[Ôò¡ÔöÇ](242)\
[¯éÂ](color_orange)\
$username$hostname\
[¯é░](bg:color_yellow fg:color_orange)\
$directory\
[¯é░](fg:color_yellow bg:color_aqua)\
$git_branch$git_commit$git_state$git_status\
[¯é░](fg:color_aqua)\
$fill\
[¯é▓](fg:color_python_blue)\
$python\
[¯é▓](fg:color_green bg:color_python_blue)\
$cmd_duration\
[¯é▓](fg:color_aqua bg:color_green)\
$jobs\
[¯é▓](fg:color_bg bg:color_aqua)\
$time\
[¯é┤](fg:color_bg)\
$line_break\
[Ôò░ÔöÇ](242)$character"""
right_format = "$status"
command_timeout = 1000
continuation_prompt = " ÔûÂÔûÂ "
palette = 'gruvbox_dark'
[palettes.gruvbox_dark]
color_text = '#fbf1c7'
color_text_dark = '#a0a9cb'
color_bg = '#3c3836'
color_python_blue = '#4b8bbe'
color_python_yellow = '#ffd43b'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d1951f'

[character]
success_symbol        = "[ÔØ»](39 bold)"
error_symbol          = "[ÔØ»](red bold)"
vimcmd_symbol         = "[ÔØ«](39 bold)"
# It appears that Zsh visual sub-modes are not yet working
# https://github.com/starship/starship/issues/625#issuecomment-732454148
vimcmd_visual_symbol  = "[V](39 bold)"
vimcmd_replace_symbol = "[ÔûÂ](39 bold)"

[username]
disabled = true

[hostname]
ssh_only = true
ssh_symbol = "´Æë "
style = "fg:color_text bold bg:color_orange"
format = "[$ssh_symbol]($style)"

[directory]
truncation_length = 4
truncate_to_repo  = true
style             = "fg:color_text bold bg:color_yellow"
format            = "[$path]($style)[$read_only]($read_only_style)"
read_only         = "´Çú"
read_only_style   = "red"

[git_branch]
symbol            = " ´äĞ"
style             = "fg:color_text bold bg:color_aqua"
format            = "[$symbol $branch]($style)"
truncation_length = 24
truncation_symbol = "ÔÇĞ"
ignore_branches   = []

[git_commit]
style         = "fg:color_text bold bg:color_aqua"
format        = '[$hash$tag ]($style)'
only_detached = true
tag_disabled  = true

[git_status]
style       = "fg:color_text bold bg:color_aqua"
format      = "([$all_status$ahead_behind]($style))"
ahead       = " ´Çø ${count}"
behind      = " ´ÇÜ {count}"
diverged    = " ´ÇÜ {behind_count} ´Çø ${ahead_count}"
up_to_date  = ""
conflicted  = " ¾▒íØ ${count}"
untracked   = " ´üÖ ${count}"
modified    = " ´ü¬ ${count}"
staged      = " ´üò ${count}"
renamed     = " ´é® ${count}"
deleted     = " ´ö░ ${count}"
stashed     = " ´Ç£ ${count}"
typechanged = ""

[git_state]
style        = "fg:red bold bg:color_aqua"
format       = "([$state( $progress_current/$progress_total)]($style))"
rebase       = "REBASING"
merge        = "MERGING"
revert       = "REVERTING"
cherry_pick  = "CHERRY-PICKING"
bisect       = "BISECTING"
am           = "AM"
am_or_rebase = "AM/REBASE"

[status]
symbol                = "Ô£İ"
not_executable_symbol = "´ô┤ "
not_found_symbol      = "´Çé "
sigint_symbol         = "¯Çë"
signal_symbol         = "¯Çè"
style                 = "red bold"
format                = " [$symbol $common_meaning$signal_name$maybe_int]($style)"
disabled = false

[python]
symbol             = "¯£╝ "
style              = "fg:color_text bold bg:color_python_blue"
format             = "[$symbol](fg:color_python_yellow bg:color_python_blue)[$virtualenv ${version}]($style)"
pyenv_version_name = false
detect_files       = []
detect_extensions  = []
generic_venv_names = ['venv', '.venv']
version_format     = "v${major}.${minor}"


[cmd_duration]
min_time = 2000
style    = "fg:color_text bg:color_green"
format   = "[$duration]($style)"

[jobs]
threshold = 1
symbol    = "´Çô"
style     = "fg:color_text bold bg:color_aqua"
format    = "[$symbol $number]($style)"

[time]
style       = "fg:color_text_dark bg:color_bg"
format      = "[´É║ $time]($style)"
time_format = "%H:%M:%S"
disabled = false

[fill]
symbol = "┬À"
style  = "237"
