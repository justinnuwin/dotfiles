---

- name: Ensure starship bin dir exists
  ansible.builtin.file:
    path: "{{ starship_bin_dir }}"
    state: directory
    mode: "0755"

- name: Install starship via official installer
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      curl -sS https://starship.rs/install.sh |
      sh -s -- -b {{ starship_bin_dir }} -v {{ starship_version }} -y
    executable: /bin/bash
  changed_when: true

- name: Mark starship installed
  ansible.builtin.set_fact:
    starship_installed: true
