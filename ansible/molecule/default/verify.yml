---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Verify .bashrc symlink exists
      ansible.builtin.stat:
        path: /root/.bashrc
      register: bashrc_stat
      failed_when: not bashrc_stat.stat.islnk

    - name: Verify .zshrc symlink exists
      ansible.builtin.stat:
        path: /root/.zshrc
      register: zshrc_stat
      failed_when: not zshrc_stat.stat.islnk

    - name: Verify .tmux.conf symlink exists
      ansible.builtin.stat:
        path: /root/.tmux.conf
      register: tmux_conf_stat
      failed_when: not tmux_conf_stat.stat.islnk

    - name: Verify ghostty config symlink exists
      ansible.builtin.stat:
        path: /root/.config/ghostty/config
      register: ghostty_config_stat
      failed_when: not ghostty_config_stat.stat.islnk

    - name: Verify dotfiles repository exists
      ansible.builtin.stat:
        path: /root/.dotfiles
      register: dotfiles_stat
      failed_when: not dotfiles_stat.stat.isdir

    - name: Verify dotfiles repository is a git repository
      ansible.builtin.stat:
        path: /root/.dotfiles/.git
      register: dotfiles_git_stat
      failed_when: not dotfiles_git_stat.stat.exists

    - name: Verify xterm-256color-italic terminfo entry installed
      ansible.builtin.command: infocmp xterm-256color-italic
      environment:
        TERMINFO: /root/.terminfo
      changed_when: false

    - name: Verify consolidated dotfiles fact file exists
      ansible.builtin.stat:
        path: /etc/ansible/facts.d/dotfiles.fact
      register: dotfiles_fact_stat
      failed_when: not dotfiles_fact_stat.stat.exists

    - name: Verify ~/.localshell contains the ansible-managed block markers
      ansible.builtin.shell:
        cmd: grep -q "ANSIBLE MANAGED BLOCK (dotfiles)" /root/.localshell
      changed_when: false

    - name: Verify starship binary exists (installed unconditionally by the role)
      ansible.builtin.stat:
        path: /root/.local/bin/starship
      register: starship_bin_stat
      failed_when: not starship_bin_stat.stat.exists

    - name: Verify neovim is installed and runnable (from the neovim PPA)
      ansible.builtin.command: nvim --version
      changed_when: false
