---
# Bootstrap python3-apt with raw, then use ansible native apt for the rest.
- name: Bootstrap python for apt module
  hosts: all
  gather_facts: false
  tasks:
    - name: Ensure python3 and python3-apt
      ansible.builtin.raw: apt-get update -qq && apt-get install -y -qq python3 python3-apt
      changed_when: false

- name: Install OS packages needed by the playbook
  hosts: all
  tasks:
    - name: Install git, unzip, and CA certificates
      ansible.builtin.apt:
        name:
          - git
          - ca-certificates
          - unzip
        state: present
        update_cache: true
